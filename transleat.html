<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مترجم آنلاین حرفه‌ای</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tahoma', 'Segoe UI', 'Vazir', system-ui, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 900px;
            padding: 30px;
            transition: all 0.3s ease;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .translation-box {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .input-section, .output-section {
            flex: 1;
            min-width: 250px;
        }

        .language-select {
            margin-bottom: 10px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: bold;
            font-size: 14px;
        }

        select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }

        textarea {
            resize: vertical;
            min-height: 200px;
            font-size: 16px;
            line-height: 1.5;
        }

        .output-section textarea {
            background-color: #f8f9fa;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        button {
            flex: 1;
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        button:active {
            transform: translateY(0);
        }

        .swap-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            min-width: 50px;
            flex: 0.2;
        }

        .clear-btn {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #667eea;
            font-weight: bold;
        }

        .error {
            color: #f5576c;
            text-align: center;
            padding: 10px;
            background: #ffe5e5;
            border-radius: 10px;
            margin-top: 10px;
        }

        .char-count {
            text-align: left;
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }
            
            .translation-box {
                flex-direction: column;
            }
            
            button {
                padding: 10px 20px;
            }
        }

        .feature-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            justify-content: center;
        }

        .feature-btn {
            background: #f0f0f0;
            color: #333;
            flex: none;
            padding: 8px 16px;
            font-size: 14px;
        }

        .feature-btn:hover {
            background: #e0e0e0;
            transform: translateY(-1px);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1> مترجم آنلاین حرفه‌ای</h1>
        <div class="subtitle">ترجمه سریع و دقیق متن</div>

        <div class="translation-box">
            <div class="input-section">
                <div class="language-select">
                    <label>زبان مبدا:</label>
                    <select id="sourceLang">
                        <option value="auto">🔍 تشخیص خودکار</option>
                        <option value="fa">🇮🇷 فارسی</option>
                        <option value="en">🇺🇸 انگلیسی</option>
                        <option value="ar">🇸🇦 عربی</option>
                        <option value="de">🇩🇪 آلمانی</option>
                        <option value="fr">🇫🇷 فرانسوی</option>
                        <option value="es">🇪🇸 اسپانیایی</option>
                        <option value="ru">🇷🇺 روسی</option>
                        <option value="tr">🇹🇷 ترکی استانبولی</option>
                        <option value="ur">🇵🇰 اردو</option>
                        <option value="hi">🇮🇳 هندی</option>
                        <option value="it">🇮🇹 ایتالیایی</option>
                        <option value="ja">🇯🇵 ژاپنی</option>
                        <option value="ko">🇰🇷 کره‌ای</option>
                        <option value="zh-cn">🇨🇳 چینی ساده</option>
                    </select>
                </div>
                <textarea id="sourceText" placeholder="متن خود را اینجا وارد کنید..."></textarea>
                <div class="char-count">
                    <span id="charCount">0</span> کاراکتر
                </div>
            </div>

            <div class="output-section">
                <div class="language-select">
                    <label>📥 زبان مقصد:</label>
                    <select id="targetLang">
                        <option value="fa">🇮🇷 فارسی</option>
                        <option value="en" selected>🇺🇸 انگلیسی</option>
                        <option value="ar">🇸🇦 عربی</option>
                        <option value="de">🇩🇪 آلمانی</option>
                        <option value="fr">🇫🇷 فرانسوی</option>
                        <option value="es">🇪🇸 اسپانیایی</option>
                        <option value="ru">🇷🇺 روسی</option>
                        <option value="tr">🇹🇷 ترکی استانبولی</option>
                        <option value="ur">🇵🇰 اردو</option>
                        <option value="hi">🇮🇳 هندی</option>
                        <option value="it">🇮🇹 ایتالیایی</option>
                        <option value="ja">🇯🇵 ژاپنی</option>
                        <option value="ko">🇰🇷 کره‌ای</option>
                        <option value="zh-cn">🇨🇳 چینی ساده</option>
                    </select>
                </div>
                <textarea id="targetText" placeholder="متن ترجمه شده در اینجا نمایش داده می‌شود..." readonly></textarea>
                <div class="char-count">
                    <span id="targetCharCount">0</span> کاراکتر
                </div>
            </div>
        </div>

        <div class="button-group">
            <button onclick="translateText()">ترجمه کن</button>
            <button class="swap-btn" onclick="swapLanguages()">تعویض</button>
            <button class="clear-btn" onclick="clearText()">پاک کردن</button>
        </div>

        <div class="feature-buttons">
            <button class="feature-btn" onclick="copyToClipboard('sourceText')">کپی متن مبدا</button>
            <button class="feature-btn" onclick="copyToClipboard('targetText')">کپی متن ترجمه</button>
            <button class="feature-btn" onclick="speakText('sourceText')">خواندن متن مبدا</button>
            <button class="feature-btn" onclick="speakText('targetText')">خواندن متن ترجمه</button>
        </div>

        <div id="loadingIndicator" class="loading" style="display: none;">
            در حال ترجمه... 
        </div>
    </div>

    <script>
        // تشخیص خودکار زبان
        async function detectLanguage(text) {
            if (!text.trim()) return null;
            
            try {
                const response = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=en&dt=t&q=${encodeURIComponent(text)}`);
                const data = await response.json();
                return data[2]; // کد زبان تشخیص داده شده
            } catch (error) {
                console.error('خطا در تشخیص زبان:', error);
                return null;
            }
        }

        // تابع اصلی ترجمه
        async function translateText() {
            const sourceText = document.getElementById('sourceText').value;
            const targetLang = document.getElementById('targetLang').value;
            let sourceLang = document.getElementById('sourceLang').value;
            
            if (!sourceText.trim()) {
                showError('لطفاً متنی برای ترجمه وارد کنید.');
                return;
            }
            
            // نمایش لودینگ
            document.getElementById('loadingIndicator').style.display = 'block';
            document.getElementById('targetText').value = '';
            
            try {
                // اگر زبان مبدا auto است، ابتدا تشخیص بده
                if (sourceLang === 'auto') {
                    const detected = await detectLanguage(sourceText);
                    if (detected && detected !== 'auto') {
                        sourceLang = detected;
                        // آپدیت dropdown (اختیاری)
                        const sourceSelect = document.getElementById('sourceLang');
                        if (sourceSelect.querySelector(`option[value="${detected}"]`)) {
                            sourceSelect.value = detected;
                        }
                    }
                }
                
                // فراخوانی API ترجمه گوگل
                const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${sourceLang}&tl=${targetLang}&dt=t&q=${encodeURIComponent(sourceText)}`;
                const response = await fetch(url);
                const data = await response.json();
                
                // استخراج متن ترجمه شده
                let translatedText = '';
                for (let i = 0; i < data[0].length; i++) {
                    translatedText += data[0][i][0];
                }
                
                document.getElementById('targetText').value = translatedText;
                updateCharCounts();
                
            } catch (error) {
                console.error('خطا در ترجمه:', error);
                showError('خطا در ترجمه متن. لطفاً اتصال اینترنت خود را بررسی کنید.');
            } finally {
                document.getElementById('loadingIndicator').style.display = 'none';
            }
        }
        
        // نمایش خطا
        function showError(message) {
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error';
            errorDiv.textContent = message;
            const container = document.querySelector('.container');
            const existingError = document.querySelector('.error');
            if (existingError) existingError.remove();
            container.insertBefore(errorDiv, document.querySelector('.button-group'));
            setTimeout(() => {
                if (errorDiv.parentNode) errorDiv.remove();
            }, 3000);
        }
        
        // تعویض زبان‌ها
        function swapLanguages() {
            const sourceLang = document.getElementById('sourceLang');
            const targetLang = document.getElementById('targetLang');
            const sourceText = document.getElementById('sourceText');
            const targetText = document.getElementById('targetText');
            
            // تعویض مقادیر dropdownها
            const tempLang = sourceLang.value;
            sourceLang.value = targetLang.value;
            targetLang.value = tempLang;
            
            // تعویض متن‌ها
            const tempText = sourceText.value;
            sourceText.value = targetText.value;
            targetText.value = tempText;
            
            updateCharCounts();
            
            // اگر متنی وجود دارد دوباره ترجمه کن
            if (sourceText.value.trim()) {
                translateText();
            }
        }
        
        // پاک کردن همه چیز
        function clearText() {
            document.getElementById('sourceText').value = '';
            document.getElementById('targetText').value = '';
            document.getElementById('sourceLang').value = 'auto';
            updateCharCounts();
        }
        
        // کپی به کلیپ‌بورد
        async function copyToClipboard(elementId) {
            const textarea = document.getElementById(elementId);
            if (!textarea.value.trim()) {
                showError('متنی برای کپی وجود ندارد.');
                return;
            }
            
            try {
                await navigator.clipboard.writeText(textarea.value);
                showError('✅ متن با موفقیت کپی شد!');
            } catch (err) {
                textarea.select();
                document.execCommand('copy');
                showError('✅ متن کپی شد!');
            }
        }
        
        // خواندن متن با TTS
        function speakText(elementId) {
            const textarea = document.getElementById(elementId);
            const text = textarea.value;
            
            if (!text.trim()) {
                showError('متنی برای خواندن وجود ندارد.');
                return;
            }
            
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text);
                // تنظیم زبان بر اساس انتخاب کاربر
                const lang = elementId === 'sourceText' 
                    ? document.getElementById('sourceLang').value 
                    : document.getElementById('targetLang').value;
                
                // نقشه زبان‌ها برای TTS
                const langMap = {
                    'fa': 'fa-IR', 'en': 'en-US', 'ar': 'ar-SA',
                    'de': 'de-DE', 'fr': 'fr-FR', 'es': 'es-ES',
                    'ru': 'ru-RU', 'tr': 'tr-TR', 'ur': 'ur-PK',
                    'hi': 'hi-IN', 'it': 'it-IT', 'ja': 'ja-JP',
                    'ko': 'ko-KR', 'zh-cn': 'zh-CN'
                };
                
                utterance.lang = langMap[lang] || 'en-US';
                window.speechSynthesis.cancel(); // توقف خواندن قبلی
                window.speechSynthesis.speak(utterance);
            } else {
                showError('مرورگر شما از قابلیت خواندن متن پشتیبانی نمی‌کند.');
            }
        }
        
        // به‌روزرسانی شمارش کاراکترها
        function updateCharCounts() {
            const sourceText = document.getElementById('sourceText').value;
            const targetText = document.getElementById('targetText').value;
            document.getElementById('charCount').textContent = sourceText.length;
            document.getElementById('targetCharCount').textContent = targetText.length;
        }
        
        // ترجمه خودکار هنگام تایپ (با تاخیر)
        let typingTimer;
        function autoTranslate() {
            clearTimeout(typingTimer);
            typingTimer = setTimeout(() => {
                const sourceText = document.getElementById('sourceText').value;
                if (sourceText.trim()) {
                    translateText();
                } else {
                    document.getElementById('targetText').value = '';
                }
            }, 800);
        }
        
        // رویدادها
        document.getElementById('sourceText').addEventListener('input', () => {
            updateCharCounts();
            autoTranslate();
        });
        
        document.getElementById('sourceLang').addEventListener('change', () => {
            if (document.getElementById('sourceText').value.trim()) {
                translateText();
            }
        });
        
        document.getElementById('targetLang').addEventListener('change', () => {
            if (document.getElementById('sourceText').value.trim()) {
                translateText();
            }
        });
        
        // شمارش اولیه کاراکترها
        updateCharCounts();
        
        // ترجمه نمونه هنگام بارگذاری صفحه
        window.addEventListener('load', () => {
            document.getElementById('sourceText').value = 'سلام! چطوری؟ خوشحالم که از مترجم من استفاده می‌کنی.';
            updateCharCounts();
            translateText();
        });
    </script>
</body>
</html>
